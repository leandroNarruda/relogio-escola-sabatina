<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Relógio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      overflow: hidden;
      padding:
        max(env(safe-area-inset-top), 5vmin)
        max(env(safe-area-inset-right), 5vmin)
        max(env(safe-area-inset-bottom), 5vmin)
        max(env(safe-area-inset-left), 5vmin);
    }

    .clock-face {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2a2a3e, #0d0d1a);
      border: 4px solid #3a3a5c;
      box-shadow:
        0 0 0 2px #1a1a2e,
        0 0 40px rgba(100, 100, 255, 0.15),
        inset 0 0 30px rgba(0, 0, 0, 0.5);
      position: relative;
      flex-shrink: 0;
      transform: scale(var(--scale, 1));
    }

    .clock-face::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tick {
      position: absolute;
      width: 3px;
      height: 16px;
      background: rgba(255, 255, 255, 0.7);
      left: 50%;
      top: 10px;
      transform-origin: 50% 120px;
      margin-left: -1.5px;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
    }

    .minute-hand {
      width: 4px;
      height: 96px;
      background: linear-gradient(to top, #ffffff, #ccccff);
      margin-left: -2px;
      border-radius: 4px 4px 2px 2px;
      box-shadow: 0 0 6px rgba(200, 200, 255, 0.4);
    }

    .second-hand {
      width: 2px;
      height: 106px;
      background: linear-gradient(to top, #ff6060, #ff4040);
      margin-left: -1px;
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(255, 60, 60, 0.6);
    }

    .second-hand::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 14px;
      background: #ff4040;
      border-radius: 2px;
    }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <div class="clock-face" id="clock">
    <div class="hand minute-hand" id="minute"></div>
    <div class="hand second-hand" id="second"></div>
    <div class="center-dot"></div>
  </div>

  <script>
    const clockEl = document.getElementById('clock');

    for (let i = 0; i < 15; i++) {
      const tick = document.createElement('div');
      tick.classList.add('tick');
      tick.style.transform = `rotate(${i * 24}deg)`;
      clockEl.appendChild(tick);
    }

    function setScale() {
      const safe = parseFloat(getComputedStyle(document.body).paddingTop) * 2;
      const available = Math.min(window.innerWidth, window.innerHeight) - safe;
      const scale = available / 260;
      document.documentElement.style.setProperty('--scale', scale);
    }

    setScale();
    window.addEventListener('resize', setScale);

    const minuteHand = document.getElementById('minute');
    const secondHand = document.getElementById('second');

    const startTime = Date.now();

    function update() {
      const elapsed = (Date.now() - startTime) / 1000;

      secondHand.style.transform = `rotate(${(elapsed % 60) * 6}deg)`;
      minuteHand.style.transform = `rotate(${(elapsed / 75) * 6}deg)`;
    }

    update();
    setInterval(update, 50);
  </script>
</body>
</html>
