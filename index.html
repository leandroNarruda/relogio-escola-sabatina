<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Relógio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      overflow: hidden;
      padding:
        max(env(safe-area-inset-top), 5vmin)
        max(env(safe-area-inset-right), 5vmin)
        max(env(safe-area-inset-bottom), 5vmin)
        max(env(safe-area-inset-left), 5vmin);
    }

    .clock-face {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2a2a3e, #0d0d1a);
      box-shadow:
        0 0 40px rgba(100, 100, 255, 0.15),
        inset 0 0 30px rgba(255, 255, 255, 0.5);
      position: relative;
      flex-shrink: 0;
      transform: scale(var(--scale, 1));
    }

.tick {
      position: absolute;
      width: 3px;
      height: 16px;
      background: rgba(255, 255, 255, 0.7);
      left: 50%;
      top: 0;
      transform-origin: 50% 130px;
      margin-left: -1.5px;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
    }

    .minute-hand {
      width: 5px;
      height: 130px;
      background: linear-gradient(to top, #ffffff, #e8e8ff);
      margin-left: -2.5px;
      border-radius: 4px 4px 2px 2px;
      box-shadow: 0 0 0 1.5px rgba(0,0,0,0.6), 0 0 8px rgba(255,255,255,0.5);
      cursor: grab;
    }

    .minute-hand.dragging { cursor: grabbing; }

    .second-hand {
      width: 2px;
      height: 106px;
      background: linear-gradient(to top, #ff6060, #ff4040);
      margin-left: -1px;
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(255, 60, 60, 0.6);
    }

    .second-hand::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 14px;
      background: #ff4040;
      border-radius: 2px;
    }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
    }

    .segments {
      position: absolute;
      top: 0;
      left: 0;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      pointer-events: none;
    }

    .alert-panel {
      position: fixed;
      right: max(env(safe-area-inset-right), 5vmin);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      max-width: 180px;
    }

    .alert-msg {
      display: none;
      color: #fff;
      font-family: sans-serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      padding: 10px 14px;
      border-radius: 10px;
      border-left: 4px solid currentColor;
    }

    .alert-msg.visible { display: block; }

    .alert-msg.green  { color: #50c878; background: rgba(80,200,120,0.12); }
    .alert-msg.yellow { color: #ffd700; background: rgba(255,215,0,0.12); }
    .alert-msg.blue   { color: #4a90d9; background: rgba(74,144,217,0.12); }
    .alert-msg.orange { color: #ff8c00; background: rgba(255,140,0,0.12); }
    .alert-msg.red    { color: #dc143c; background: rgba(220,20,60,0.12); }

    .drag-time-tooltip {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.8rem;
      font-weight: bold;
      font-family: sans-serif;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(100, 100, 255, 0.8);
      pointer-events: none;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      padding: 4px 12px;
      border-radius: 8px;
      letter-spacing: 2px;
    }

    .drag-time-tooltip.visible { display: block; }
  </style>
</head>
<body>
  <div class="clock-face" id="clock">
    <div class="hand minute-hand" id="minute"></div>
    <div class="hand second-hand" id="second"></div>
    <div class="center-dot"></div>
    <div id="drag-time-tooltip" class="drag-time-tooltip"></div>
  </div>

  <div class="alert-panel" id="alertPanel">
    <div class="alert-msg" id="alertMsg"></div>
  </div>

  <script>
    const clockEl = document.getElementById('clock');

    function setScale() {
      const safe = parseFloat(getComputedStyle(document.body).paddingTop) * 2;
      const available = Math.min(window.innerWidth, window.innerHeight) - safe;
      const scale = available / 260;
      document.documentElement.style.setProperty('--scale', scale);
    }

    setScale();
    window.addEventListener('resize', setScale);

    function polarToXY(cx, cy, r, clockDeg) {
      const rad = (clockDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function segmentPath(cx, cy, r, startDeg, endDeg) {
      const s = polarToXY(cx, cy, r, startDeg);
      const e = polarToXY(cx, cy, r, endDeg);
      const large = endDeg - startDeg > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${s.x.toFixed(3)} ${s.y.toFixed(3)} A ${r} ${r} 0 ${large} 1 ${e.x.toFixed(3)} ${e.y.toFixed(3)} Z`;
    }

    const segments = [
      { start:   0, end:  48, color: '#50c878' }, // verde   — 0–10 min
      { start:  48, end:  72, color: '#ffd700' }, // amarelo — 10–15 min
      { start:  72, end: 288, color: '#4a90d9' }, // azul    — 15–60 min
      { start: 288, end: 312, color: '#ff8c00' }, // laranja — 60–65 min
      { start: 312, end: 360, color: '#dc143c' }, // vermelho — 65–75 min
    ];

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 260 260');
    svg.classList.add('segments');

    segments.forEach(({ start, end, color }) => {
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', segmentPath(130, 130, 126, start, end));
      path.setAttribute('fill', color);
      path.setAttribute('fill-opacity', '0.55');
      path.setAttribute('stroke', 'none');
      svg.appendChild(path);
    });

    const labels = [
      { midDeg:  24, text: 'Abertura' },
      { midDeg:  60, text: 'Confraternização' },
      { midDeg: 180, text: 'Lição' },
      { midDeg: 300, text: 'Pastoreio' },
      { midDeg: 336, text: 'Fechamento' },
    ];

    labels.forEach(({ midDeg, text: label }) => {
      const r = 80;
      const { x, y } = polarToXY(130, 130, r, midDeg);
      const rot = (midDeg > 90 && midDeg < 270) ? midDeg + 90 : midDeg - 90;

      const g = document.createElementNS(svgNS, 'g');
      g.setAttribute('transform', `translate(${x.toFixed(3)} ${y.toFixed(3)}) rotate(${rot})`);

      const textEl = document.createElementNS(svgNS, 'text');
      textEl.setAttribute('text-anchor', 'middle');
      textEl.setAttribute('dominant-baseline', 'central');
      textEl.setAttribute('fill', '#fff');
      textEl.setAttribute('font-size', '10');
      textEl.setAttribute('font-family', 'sans-serif');
      textEl.setAttribute('font-weight', '600');
      textEl.textContent = label;

      g.appendChild(textEl);
      svg.appendChild(g);
    });

    const shadowPath = document.createElementNS(svgNS, 'path');
    shadowPath.setAttribute('fill', 'rgba(0, 0, 0, 0.78)');
    shadowPath.setAttribute('stroke', 'none');
    svg.appendChild(shadowPath);

    clockEl.insertBefore(svg, clockEl.firstChild);

    const licaoStart = 72;
    const licaoEnd = 288;
    const licaoTicks = Array.from({ length: 6 }, (_, i) =>
      licaoStart + ((licaoEnd - licaoStart) * (i + 1)) / 7
    );

    [0, 48, 72, 288, 312, ...licaoTicks].forEach(deg => {
      const tick = document.createElement('div');
      tick.classList.add('tick');
      tick.style.transform = `rotate(${deg}deg)`;
      clockEl.appendChild(tick);
    });

    const minuteHand = document.getElementById('minute');
    const secondHand = document.getElementById('second');
    const alertMsg = document.getElementById('alertMsg');
    const dragTooltip = document.getElementById('drag-time-tooltip');

    function degToTimeStr(deg) {
      const totalMinutes = deg / 360 * 75;
      const total = Math.floor(9 * 60 + totalMinutes);
      const h = Math.floor(total / 60);
      const m = total % 60;
      return `${h}h${String(m).padStart(2, '0')}`;
    }
    const alertStages = [
      { end: 10,  next: 'a confraternização', color: 'green'  },
      { end: 15,  next: 'a lição',            color: 'yellow' },
      { end: 60,  next: 'o pastoreio',        color: 'blue'   },
      { end: 65,  next: 'o fechamento',       color: 'orange' },
      { end: 75,  next: 'o fim',              color: 'red'    },
    ];

    let startTime = Date.now();
    let dragging = false;
    let dragDeg = 0;

    function clockCenter() {
      const r = clockEl.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }

    function pointerAngle(clientX, clientY) {
      const c = clockCenter();
      const deg = Math.atan2(clientX - c.x, -(clientY - c.y)) * 180 / Math.PI;
      return (deg + 360) % 360;
    }

    function update() {
      const elapsed = (Date.now() - startTime) / 1000;
      const minuteDeg = dragging ? dragDeg : (elapsed / 75) * 6;

      secondHand.style.transform = `rotate(${(elapsed % 60) * 6}deg)`;
      minuteHand.style.transform = `rotate(${minuteDeg}deg)`;

      const capped = Math.min(minuteDeg, 359.99);
      if (capped > 0.05) {
        shadowPath.setAttribute('d', segmentPath(130, 130, 126, 0, capped));
      } else {
        shadowPath.setAttribute('d', '');
      }

      const minutesElapsed = dragging ? (dragDeg / 6 * 75 / 60) : (elapsed / 60);
      const stage = alertStages.find(s => minutesElapsed < s.end);
      if (stage) {
        const remaining = Math.ceil(stage.end - minutesElapsed);
        const label = remaining === 1 ? 'minuto' : 'minutos';
        alertMsg.textContent = `faltam ${remaining} ${label} para ${stage.next}`;
        alertMsg.className = `alert-msg ${stage.color} visible`;
      } else {
        alertMsg.className = 'alert-msg';
      }
    }

    minuteHand.addEventListener('mousedown', e => {
      dragging = true;
      dragDeg = pointerAngle(e.clientX, e.clientY);
      minuteHand.classList.add('dragging');
      dragTooltip.textContent = degToTimeStr(dragDeg);
      dragTooltip.classList.add('visible');
      e.preventDefault();
    });

    minuteHand.addEventListener('touchstart', e => {
      dragging = true;
      dragDeg = pointerAngle(e.touches[0].clientX, e.touches[0].clientY);
      minuteHand.classList.add('dragging');
      dragTooltip.textContent = degToTimeStr(dragDeg);
      dragTooltip.classList.add('visible');
      e.preventDefault();
    }, { passive: false });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      dragDeg = pointerAngle(e.clientX, e.clientY);
      dragTooltip.textContent = degToTimeStr(dragDeg);
    });

    window.addEventListener('touchmove', e => {
      if (!dragging) return;
      dragDeg = pointerAngle(e.touches[0].clientX, e.touches[0].clientY);
      dragTooltip.textContent = degToTimeStr(dragDeg);
    }, { passive: true });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      startTime = Date.now() - (dragDeg / 6 * 75) * 1000;
      dragging = false;
      minuteHand.classList.remove('dragging');
      dragTooltip.classList.remove('visible');
    });

    window.addEventListener('touchend', e => {
      if (!dragging) return;
      dragDeg = pointerAngle(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      startTime = Date.now() - (dragDeg / 6 * 75) * 1000;
      dragging = false;
      minuteHand.classList.remove('dragging');
      dragTooltip.classList.remove('visible');
    });

    update();
    setInterval(update, 50);
  </script>
</body>
</html>
