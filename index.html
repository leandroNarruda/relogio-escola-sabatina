<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Relógio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      overflow: hidden;
      padding:
        max(env(safe-area-inset-top), 5vmin)
        max(env(safe-area-inset-right), 5vmin)
        max(env(safe-area-inset-bottom), 5vmin)
        max(env(safe-area-inset-left), 5vmin);
    }

    .clock-face {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2a2a3e, #0d0d1a);
      box-shadow:
        0 0 40px rgba(100, 100, 255, 0.15),
        inset 0 0 30px rgba(255, 255, 255, 0.5);
      position: relative;
      flex-shrink: 0;
      transform: scale(var(--scale, 1));
    }

.tick {
      position: absolute;
      width: 3px;
      height: 16px;
      background: rgba(255, 255, 255, 1);
      left: 50%;
      top: 0;
      transform-origin: 50% 130px;
      margin-left: -1.5px;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
    }

    .minute-hand {
      width: 5px;
      height: 130px;
      background-color: white;
      margin-left: -2.5px;
      border-radius: 4px 4px 2px 2px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 0 8px rgba(255,255,255,0.5);
      cursor: grab;
      z-index: 15;
    }

    .minute-hand.dragging { cursor: grabbing; }

    .second-hand {
      width: 2px;
      height: 106px;
      background: linear-gradient(to top, #ff6060, #ff4040);
      margin-left: -1px;
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(255, 60, 60, 0.6);
    }

    .second-hand::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 14px;
      background: #ff4040;
      border-radius: 2px;
    }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      z-index: 20;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 0 8px rgba(255,255,255,0.5);
    }

    .segments {
      position: absolute;
      top: 0;
      left: 0;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      pointer-events: none;
    }

    .alert-panel {
      position: fixed;
      right: max(env(safe-area-inset-right), 5vmin);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      max-width: 260px;
    }

    @media (orientation: portrait) {
      .alert-panel {
        right: 50%;
        top: calc(50% + 130px * var(--scale, 1) + 20px);
        transform: translateX(50%);
        max-width: min(90vw, 400px);
        align-items: center;
      }

      .alert-msg {
        text-align: center;
      }
    }

    .alert-msg {
      display: none;
      color: #fff;
      font-family: sans-serif;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
      padding: 10px 14px;
      border-radius: 10px;
      border-left: 4px solid currentColor;
    }

    .alert-msg.visible { display: block; }

    .alert-msg.green  { color: #50c878; background: rgba(80,200,120,0.12); }
    .alert-msg.yellow { color: #ffd700; background: rgba(255,215,0,0.12); }
    .alert-msg.blue   { color: #4a90d9; background: rgba(74,144,217,0.12); }
    .alert-msg.orange { color: #ff8c00; background: rgba(255,140,0,0.12); }
    .alert-msg.red    { color: #dc143c; background: rgba(220,20,60,0.12); }

    @keyframes urgente {
      0%   { background: rgba(220,20,60,0.12); box-shadow: none;                         transform: scale(1);    color: #dc143c; }
      40%  { background: rgba(220,20,60,0.85); box-shadow: 0 0 22px rgba(220,20,60,0.8); transform: scale(1.06); color: #fff;    }
      100% { background: rgba(220,20,60,0.12); box-shadow: none;                         transform: scale(1);    color: #dc143c; }
    }

    .alert-msg.urgente {
      animation: urgente 0.9s ease-in-out infinite;
      border-left-color: #dc143c;
    }

    .fx-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1000;
    }

    .confetti {
      position: absolute;
      top: -5vh;
      width: 10px;
      height: 14px;
      border-radius: 2px;
      will-change: transform, opacity;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0%   { transform: translate3d(0, -10vh, 0) rotate(0deg);           opacity: 1; }
      100% { transform: translate3d(var(--dx), 115vh, 0) rotate(var(--rot)); opacity: 0.85; }
    }

    .stage-banner {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1001;
      font-family: sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 7vmin, 4.5rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 20px currentColor,
        0 0 40px currentColor,
        0 4px 14px rgba(0,0,0,0.8);
      animation: stage-banner 2.4s ease-out forwards;
    }

    @keyframes stage-banner {
      0%   { opacity: 0; transform: scale(0.3)  translateY(10vh); filter: blur(20px); }
      18%  { opacity: 1; transform: scale(1.18) translateY(0);    filter: blur(0);    }
      55%  { opacity: 1; transform: scale(1)    translateY(0);    filter: blur(0);    }
      100% { opacity: 0; transform: scale(1.3)  translateY(-8vh); filter: blur(6px);  }
    }

    .flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: radial-gradient(circle at center, var(--flash-color, #fff) 0%, transparent 65%);
      animation: flash 0.9s ease-out forwards;
    }

    @keyframes flash {
      0%   { opacity: 0;    }
      20%  { opacity: 0.55; }
      100% { opacity: 0;    }
    }

    .drag-time-tooltip {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.8rem;
      font-weight: bold;
      font-family: sans-serif;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(100, 100, 255, 0.8);
      pointer-events: none;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      padding: 4px 12px;
      border-radius: 8px;
      letter-spacing: 2px;
    }

    .drag-time-tooltip.visible { display: block; }

    #start-overlay {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
      cursor: pointer;
    }

    #start-overlay.hidden { display: none; }

    #start-overlay span {
      font-family: sans-serif;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    #start-btn {
      background: none;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      color: #ffffff;
      font-family: sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 0.75rem 2.5rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #start-btn:hover {
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
    }
  </style>
</head>
<body>
  <div id="start-overlay">
    <button id="start-btn">▶ Iniciar relógio</button>
    <span>Toque para começar a cronometrar a programação</span>
  </div>
  <div class="clock-face" id="clock">
    <div class="hand minute-hand" id="minute"></div>
    <div class="hand second-hand" id="second"></div>
    <div class="center-dot"></div>
    <div id="drag-time-tooltip" class="drag-time-tooltip"></div>
  </div>

  <div class="alert-panel" id="alertPanel">
    <div class="alert-msg" id="alertMsg"></div>
  </div>

  <script>
    const clockEl = document.getElementById('clock');

    function setScale() {
      const safe = parseFloat(getComputedStyle(document.body).paddingTop) * 2;
      const available = Math.min(window.innerWidth, window.innerHeight) - safe;
      const scale = available / 260;
      document.documentElement.style.setProperty('--scale', scale);
    }

    setScale();
    window.addEventListener('resize', setScale);

    function polarToXY(cx, cy, r, clockDeg) {
      const rad = (clockDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function segmentPath(cx, cy, r, startDeg, endDeg) {
      const s = polarToXY(cx, cy, r, startDeg);
      const e = polarToXY(cx, cy, r, endDeg);
      const large = endDeg - startDeg > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${s.x.toFixed(3)} ${s.y.toFixed(3)} A ${r} ${r} 0 ${large} 1 ${e.x.toFixed(3)} ${e.y.toFixed(3)} Z`;
    }

    const segments = [
      { start:   0, end:  72, color: '#00e676' }, // verde   — 0–15 min
      { start:  72, end:  96, color: '#ffea00' }, // amarelo — 15–20 min
      { start:  96, end: 288, color: '#00b0ff' }, // azul    — 20–60 min
      { start: 288, end: 336, color: '#ff1744' }, // vermelho — 60–70 min (fechamento)
      { start: 336, end: 360, color: '#ff6d00' }, // laranja  — 70–75 min (pastoreio)
    ];

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 260 260');
    svg.classList.add('segments');

    segments.forEach(({ start, end, color }) => {
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', segmentPath(130, 130, 126, start, end));
      path.setAttribute('fill', color);
      path.setAttribute('fill-opacity', '0.85');
      path.setAttribute('stroke', 'none');
      svg.appendChild(path);
    });

    const labels = [
      { midDeg:  36, text: 'Abertura' },
      { midDeg:  84, text: 'Confraternização' },
      { midDeg: 192, text: 'Lição' },
      { midDeg: 312, text: 'Fechamento' },
      { midDeg: 348, text: 'Pastoreio' },
    ];

    labels.forEach(({ midDeg, text: label }) => {
      const r = 80;
      const { x, y } = polarToXY(130, 130, r, midDeg);
      const rot = (midDeg > 90 && midDeg < 270) ? midDeg + 90 : midDeg - 90;

      const g = document.createElementNS(svgNS, 'g');
      g.setAttribute('transform', `translate(${x.toFixed(3)} ${y.toFixed(3)}) rotate(${rot})`);

      const textEl = document.createElementNS(svgNS, 'text');
      textEl.setAttribute('text-anchor', 'middle');
      textEl.setAttribute('dominant-baseline', 'central');
      textEl.setAttribute('fill', '#fff');
      textEl.setAttribute('font-size', '10');
      textEl.setAttribute('font-family', 'sans-serif');
      textEl.setAttribute('font-weight', '600');
      textEl.textContent = label;

      g.appendChild(textEl);
      svg.appendChild(g);
    });

    const defs = document.createElementNS(svgNS, 'defs');
    svg.appendChild(defs);

    const dias = ['Sábado', 'Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'];
    const licaoStartDeg = 96;
    const licaoSpan = 192; // 288 - 96
    const arcR = 113;

    dias.forEach((dia, i) => {
      const s = licaoStartDeg + (licaoSpan * i) / 7;
      const e = licaoStartDeg + (licaoSpan * (i + 1)) / 7;

      const p1 = polarToXY(130, 130, arcR, s);
      const p2 = polarToXY(130, 130, arcR, e);

      const arcPath = document.createElementNS(svgNS, 'path');
      const pathId = `dia-arc-${i}`;
      arcPath.setAttribute('id', pathId);
      arcPath.setAttribute('d',
        `M ${p1.x.toFixed(3)} ${p1.y.toFixed(3)} ` +
        `A ${arcR} ${arcR} 0 0 1 ${p2.x.toFixed(3)} ${p2.y.toFixed(3)}`
      );
      arcPath.setAttribute('fill', 'none');
      defs.appendChild(arcPath);

      const textEl = document.createElementNS(svgNS, 'text');
      textEl.setAttribute('font-size', '8');
      textEl.setAttribute('font-family', 'sans-serif');
      textEl.setAttribute('font-weight', '600');
      textEl.setAttribute('fill', '#fff');
      textEl.setAttribute('fill-opacity', '0.9');

      const textPath = document.createElementNS(svgNS, 'textPath');
      textPath.setAttribute('href', `#${pathId}`);
      textPath.setAttribute('startOffset', '50%');
      textPath.setAttribute('text-anchor', 'middle');
      textPath.setAttribute('dominant-baseline', 'middle');
      textPath.textContent = dia;

      textEl.appendChild(textPath);
      svg.appendChild(textEl);
    });

    const shadowPath = document.createElementNS(svgNS, 'path');
    shadowPath.setAttribute('fill', 'rgba(0, 0, 0, 0.78)');
    shadowPath.setAttribute('stroke', 'none');
    svg.appendChild(shadowPath);

    clockEl.insertBefore(svg, clockEl.firstChild);

    const licaoStart = 96;
    const licaoEnd = 288;
    const licaoTicks = Array.from({ length: 6 }, (_, i) =>
      licaoStart + ((licaoEnd - licaoStart) * (i + 1)) / 7
    );

    [0, 72, 96, 288, 336, ...licaoTicks].forEach(deg => {
      const tick = document.createElement('div');
      tick.classList.add('tick');
      tick.style.transform = `rotate(${deg}deg)`;
      clockEl.appendChild(tick);
    });

    const minuteHand = document.getElementById('minute');
    const secondHand = document.getElementById('second');
    const alertMsg = document.getElementById('alertMsg');
    const dragTooltip = document.getElementById('drag-time-tooltip');

    function degToTimeStr(deg) {
      const totalMinutes = deg / 360 * 75;
      const total = Math.floor(9 * 60 + totalMinutes);
      const h = Math.floor(total / 60);
      const m = total % 60;
      return `${h}h${String(m).padStart(2, '0')}`;
    }
    const alertStages = [
      { end: 15,  next: 'a confraternização', color: 'green',  audioKey: 'confraternizacao' },
      { end: 20,  next: 'a lição',            color: 'yellow', audioKey: 'licao'            },
      { end: 70,  next: 'o pastoreio',        color: 'orange', audioKey: 'pastoreio'        },
      { end: 75,  next: 'o fim',              color: 'red',    audioKey: null               },
    ];

    const audios = {
      hora: {
        confraternizacao: new Audio('audio/hora_confraternizacao.mp3'),
        licao:            new Audio('audio/hora_licao.mp3'),
        fechamento:       new Audio('audio/hora_fechamento.mp3'),
        pastoreio:        new Audio('audio/hora_pastoreio.mp3'),
      },
      umMinuto: {
        confraternizacao: new Audio('audio/um_minuto_confraternizacao.mp3'),
        licao:            new Audio('audio/um_minuto_licao.mp3'),
        fechamento:       new Audio('audio/um_minuto_fechamento.mp3'),
        pastoreio:        new Audio('audio/um_minuto_pastoreio.mp3'),
      },
    };

    const stageAudioMap = {
      confraternizacao: 'confraternizacao',
      fechamento:       'fechamento',
      pastoreio:        'pastoreio',
    };

    let umMinutoPlayed = { confraternizacao: false, licao: false, fechamento: false, pastoreio: false };

    function playAudio(audio) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    const licaoDias = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'];
    const licaoMinStart = 20;
    const licaoMinEnd   = 60;
    const licaoDuracao  = licaoMinEnd - licaoMinStart; // 40 min

    const licaoDiasKeys = ['sabado', 'domingo', 'segunda', 'terca', 'quarta', 'quinta', 'sexta'];

    const stageInfo = {
      abertura:         { label: 'Abertura',         color: '#50c878', palette: ['#50c878','#8ee8a8','#2e9d5a','#ffffff'] },
      confraternizacao: { label: 'Confraternização', color: '#ffd700', palette: ['#ffd700','#ffe866','#c9a800','#ffffff'] },
      'licao-sabado':   { label: 'Lição · Sábado',   color: '#4a90d9', palette: ['#4a90d9','#7ab0e8','#2a6eb0','#ffffff'] },
      'licao-domingo':  { label: 'Lição · Domingo',  color: '#4a90d9', palette: ['#4a90d9','#7ab0e8','#2a6eb0','#ffffff'] },
      'licao-segunda':  { label: 'Lição · Segunda',  color: '#4a90d9', palette: ['#4a90d9','#7ab0e8','#2a6eb0','#ffffff'] },
      'licao-terca':    { label: 'Lição · Terça',    color: '#4a90d9', palette: ['#4a90d9','#7ab0e8','#2a6eb0','#ffffff'] },
      'licao-quarta':   { label: 'Lição · Quarta',   color: '#4a90d9', palette: ['#4a90d9','#7ab0e8','#2a6eb0','#ffffff'] },
      'licao-quinta':   { label: 'Lição · Quinta',   color: '#4a90d9', palette: ['#4a90d9','#7ab0e8','#2a6eb0','#ffffff'] },
      'licao-sexta':    { label: 'Lição · Sexta',    color: '#4a90d9', palette: ['#4a90d9','#7ab0e8','#2a6eb0','#ffffff'] },
      pastoreio:        { label: 'Pastoreio',        color: '#ff8c00', palette: ['#ff8c00','#ffb347','#cc6f00','#ffffff'] },
      fechamento:       { label: 'Fechamento',       color: '#dc143c', palette: ['#dc143c','#ff5673','#9b0e2a','#ffffff'] },
      fim:              { label: 'Fim',              color: '#dc143c', palette: ['#dc143c','#ff5673','#9b0e2a','#ffffff'] },
    };

    function currentStageKey(m) {
      if (m < 15) return 'abertura';
      if (m < 20) return 'confraternizacao';
      if (m < 60) {
        const idx = Math.min(6, Math.floor((m - 20) / (licaoDuracao / 7)));
        return 'licao-' + licaoDiasKeys[idx];
      }
      if (m < 70) return 'fechamento';
      if (m < 75) return 'pastoreio';
      return 'fim';
    }

    function fireStageAnimation(key) {
      const info = stageInfo[key];
      if (!info) return;

      const flash = document.createElement('div');
      flash.className = 'flash';
      flash.style.setProperty('--flash-color', info.color);
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 900);

      const banner = document.createElement('div');
      banner.className = 'stage-banner';
      banner.style.color = info.color;
      banner.textContent = info.label;
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 2400);

      const layer = document.createElement('div');
      layer.className = 'fx-layer';
      document.body.appendChild(layer);

      const N = 90;
      for (let i = 0; i < N; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = (Math.random() * 100) + 'vw';
        piece.style.background = info.palette[i % info.palette.length];
        piece.style.setProperty('--dx', ((Math.random() - 0.5) * 60) + 'vw');
        piece.style.setProperty('--rot', (Math.random() * 1440 - 720) + 'deg');
        piece.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
        piece.style.animationDelay = (Math.random() * 0.4) + 's';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (10 + Math.random() * 10) + 'px';
        piece.style.opacity = 0.85 + Math.random() * 0.15;
        layer.appendChild(piece);
      }
      setTimeout(() => layer.remove(), 4500);
    }

    let lastStageKey = null;

    let sessionStarted = false;
    let startTime = Date.now();
    let dragging = false;
    let dragDeg = 0;

    document.getElementById('start-overlay').addEventListener('click', () => {
      document.getElementById('start-overlay').classList.add('hidden');
      startTime = Date.now();
      lastStageKey = null;
      sessionStarted = true;
    });

    function clockCenter() {
      const r = clockEl.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }

    function pointerAngle(clientX, clientY) {
      const c = clockCenter();
      const deg = Math.atan2(clientX - c.x, -(clientY - c.y)) * 180 / Math.PI;
      return (deg + 360) % 360;
    }

    function update() {
      if (!sessionStarted) return;
      const elapsed = (Date.now() - startTime) / 1000;
      const minuteDeg = dragging ? dragDeg : (elapsed / 75) * 6;

      secondHand.style.transform = `rotate(${(elapsed % 60) * 6}deg)`;
      minuteHand.style.transform = `rotate(${minuteDeg}deg)`;

      const capped = Math.min(minuteDeg, 359.99);
      if (capped > 0.05) {
        shadowPath.setAttribute('d', segmentPath(130, 130, 126, 0, capped));
      } else {
        shadowPath.setAttribute('d', '');
      }

      const minutesElapsed = dragging ? (dragDeg / 6 * 75 / 60) : (elapsed / 60);

      const stageKey = currentStageKey(minutesElapsed);
      if (lastStageKey === null) {
        lastStageKey = stageKey;
      } else if (stageKey !== lastStageKey) {
        if (!dragging) {
          fireStageAnimation(stageKey);
          const audioKey = stageAudioMap[stageKey] ??
            (stageKey.startsWith('licao-') && !lastStageKey.startsWith('licao-') ? 'licao' : null);
          if (audioKey) playAudio(audios.hora[audioKey]);
          if (stageKey === 'fim') {
            setTimeout(() => {
              sessionStarted = false;
              lastStageKey = null;
              umMinutoPlayed = { confraternizacao: false, licao: false, fechamento: false, pastoreio: false };
              alertMsg.className = 'alert-msg';
              document.getElementById('start-overlay').classList.remove('hidden');
            }, 4500);
          }
        }
        lastStageKey = stageKey;
      }

      let remaining, color;

      if (minutesElapsed >= licaoMinStart && minutesElapsed < licaoMinEnd) {
        const pos = (minutesElapsed - licaoMinStart) / licaoDuracao * 7;
        const diaIdx = Math.floor(pos);
        if (diaIdx < 6) {
          const nextDia = licaoDias[diaIdx];
          const endDia = licaoMinStart + (diaIdx + 1) * (licaoDuracao / 7);
          remaining = Math.ceil(endDia - minutesElapsed);
          const label = remaining === 1 ? 'minuto' : 'minutos';
          alertMsg.textContent = `faltam ${remaining} ${label} para a parte de ${nextDia}`;
        } else {
          remaining = Math.ceil(licaoMinEnd - minutesElapsed);
          const label = remaining === 1 ? 'minuto' : 'minutos';
          alertMsg.textContent = `faltam ${remaining} ${label} para o fechamento`;
        }
        color = 'blue';
        alertMsg.className = `alert-msg blue visible${remaining <= 1 ? ' urgente' : ''}`;

        // um minuto antes do fechamento (ocorre dentro do bloco lição, minuto ~59)
        const minFechamento = licaoMinEnd - minutesElapsed;
        if (minFechamento <= 1 && minFechamento > 0 && !umMinutoPlayed.fechamento) {
          umMinutoPlayed.fechamento = true;
          if (!dragging) playAudio(audios.umMinuto.fechamento);
        }
        if (minFechamento > 1) umMinutoPlayed.fechamento = false;
      } else {
        const stage = alertStages.find(s => minutesElapsed < s.end);
        if (stage) {
          remaining = Math.ceil(stage.end - minutesElapsed);
          const minutesRemaining = stage.end - minutesElapsed;
          const label = remaining === 1 ? 'minuto' : 'minutos';
          alertMsg.textContent = `faltam ${remaining} ${label} para ${stage.next}`;
          alertMsg.className = `alert-msg ${stage.color} visible${remaining <= 1 ? ' urgente' : ''}`;

          if (stage.audioKey) {
            if (minutesRemaining <= 1 && minutesRemaining > 0 && !umMinutoPlayed[stage.audioKey]) {
              umMinutoPlayed[stage.audioKey] = true;
              if (!dragging) playAudio(audios.umMinuto[stage.audioKey]);
            }
            if (minutesRemaining > 1) umMinutoPlayed[stage.audioKey] = false;
          }
        } else {
          alertMsg.className = 'alert-msg';
        }
      }
    }

    minuteHand.addEventListener('mousedown', e => {
      dragging = true;
      dragDeg = pointerAngle(e.clientX, e.clientY);
      minuteHand.classList.add('dragging');
      dragTooltip.textContent = degToTimeStr(dragDeg);
      dragTooltip.classList.add('visible');
      e.preventDefault();
    });

    minuteHand.addEventListener('touchstart', e => {
      dragging = true;
      dragDeg = pointerAngle(e.touches[0].clientX, e.touches[0].clientY);
      minuteHand.classList.add('dragging');
      dragTooltip.textContent = degToTimeStr(dragDeg);
      dragTooltip.classList.add('visible');
      e.preventDefault();
    }, { passive: false });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      dragDeg = pointerAngle(e.clientX, e.clientY);
      dragTooltip.textContent = degToTimeStr(dragDeg);
    });

    window.addEventListener('touchmove', e => {
      if (!dragging) return;
      dragDeg = pointerAngle(e.touches[0].clientX, e.touches[0].clientY);
      dragTooltip.textContent = degToTimeStr(dragDeg);
    }, { passive: true });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      startTime = Date.now() - (dragDeg / 6 * 75) * 1000;
      dragging = false;
      minuteHand.classList.remove('dragging');
      dragTooltip.classList.remove('visible');
    });

    window.addEventListener('touchend', e => {
      if (!dragging) return;
      dragDeg = pointerAngle(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      startTime = Date.now() - (dragDeg / 6 * 75) * 1000;
      dragging = false;
      minuteHand.classList.remove('dragging');
      dragTooltip.classList.remove('visible');
    });

    update();
    setInterval(update, 50);
  </script>
</body>
</html>
